version: "3.8"

services:
  redis:
    image: redis:latest
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

  api-gateway:
    build: ./services/api-gateway
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - USER_SERVICE_URL=http://user-service:3001
      - EVENT_SERVICE_URL=http://event-service:3002
      - BOOKING_SERVICE_URL=http://booking-service:3003
      - PAYMENT_SERVICE_URL=http://payment-service:3004
      - JWT_SECRET=your_jwt_secret
    depends_on:
      - user-service
      - event-service
      - booking-service

  user-service:
    build: ./services/user-service
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - MONGODB_URI=mongodb://host.docker.internal:27017/ticketflow_users
      - JWT_SECRET=your_jwt_secret

  event-service:
    build: ./services/event-service
    ports:
      - "3002:3002"
    environment:
      - PORT=3002
      - MONGODB_URI=mongodb://host.docker.internal:27017/ticketflow_events
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis

  booking-service:
    build: ./services/booking-service
    ports:
      - "3003:3003"
    environment:
      - PORT=3003
      - MONGODB_URI=mongodb://host.docker.internal:27017/ticketflow_bookings
      - REDIS_URL=redis://redis:6379
      - RABBITMQ_URL=amqp://rabbitmq:5672
    depends_on:
      - redis
      - rabbitmq

  payment-service:
    build: ./services/payment-service
    ports:
      - "3004:3004"
    environment:
      - PORT=3004
      - MONGODB_URI=mongodb://host.docker.internal:27017/ticketflow_payments
      - RABBITMQ_URL=amqp://rabbitmq:5672
      - BOOKING_SERVICE_URL=http://booking-service:3003
    depends_on:
      - rabbitmq

  notification-service:
    build: ./services/notification-service
    ports:
      - "3005:3005"
    environment:
      - PORT=3005
      - MONGODB_URI=mongodb://host.docker.internal:27017/ticketflow_notifications
      - RABBITMQ_URL=amqp://rabbitmq:5672
    depends_on:
      - rabbitmq

